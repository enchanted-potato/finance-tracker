<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .message { font-size: 18px; }
        .sub { font-size: 14px; opacity: 0.8; margin-top: 8px; }
    </style>
</head>
<body>
    <div>
        <div class="message" id="msg">Signing in with Google...</div>
        <div class="sub" id="sub">You can close this tab once done.</div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js';
        import {
            getAuth,
            signInWithRedirect,
            getRedirectResult,
            GoogleAuthProvider,
            indexedDBLocalPersistence,
            setPersistence
        } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js';

        const params = new URLSearchParams(window.location.search);
        const config = JSON.parse(decodeURIComponent(params.get('config') || '{}'));

        if (!config.apiKey) {
            document.getElementById('msg').textContent = 'Error: missing configuration.';
        } else {
            const app = initializeApp(config);
            const auth = getAuth(app);

            // Use indexedDB so state survives the redirect on iOS
            await setPersistence(auth, indexedDBLocalPersistence);

            try {
                const result = await getRedirectResult(auth);
                if (result) {
                    // Auth completed — relay token to main app
                    const token = await result.user.getIdToken();
                    localStorage.setItem('finance_tracker_auth_relay', JSON.stringify({
                        token,
                        ts: Date.now()
                    }));
                    document.getElementById('msg').textContent = 'Signed in! You can close this tab.';
                    window.close();
                } else {
                    // First visit — start redirect
                    await signInWithRedirect(auth, new GoogleAuthProvider());
                }
            } catch (err) {
                console.error(err);
                document.getElementById('msg').textContent = 'Sign-in failed. Please close this tab and try again.';
                document.getElementById('sub').textContent = err.message;
            }
        }
    </script>
</body>
</html>
